<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 - Semantic</title>
    <link rel="stylesheet" href="../css/master.css">
    <style>
        section.section main {
            header.h{
                background-color: #fac0007e;
                text-align: center;
                border: 2px solid rgb(255, 255, 255);
                width: 100%;
            }

            nav {
                background-color: #4ffa007e;
                text-align: center;
                border: 2px solid rgb(255, 255, 255);
                width: 100%;
            }

            section {
                display: flex;
                border: 2px solid rgb(255, 255, 255);
                height: 10rem;
                text-align: center;

            }

            .content-left {
                width: 50%;
                border: 2px solid rgb(255, 255, 255);
            }

            .content-right {
                width: 50%;
                border: 2px solid rgb(255, 255, 255);
            }

            section {
                background-color: #4300fa6c;
                height: 50%;
                text-align: center;
                border: 2px solid rgb(255, 255, 255);
            }

            article {
                background-color: #00e9fa6c;
                height: 50%;
                text-align: center;
                border: 2px solid rgb(255, 255, 255);
            }

            aside {
                background-color: #fa32006c;
                height: 100%;
                border: 2px solid rgb(255, 255, 255);
            }

            footer {
                background-color: #fa00ed6c;
                border: 2px solid rgb(255, 255, 255);
                width: 100%;
            }
        }
        section.section main{
            width: 100%;
            margin: 0;
            section{
                width: 100%;
            
            }
        }
    </style>
</head>

<body class="html">
    <a href="index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
        </svg>
    </a>
    <main>
        <header class="header">
            <h1>16-semantic</h1>
            <h2>Defines layout with semantic tags (new style). </h2>
        </header>
        <section>
            <section class="section">
                <main>
                    <header class="h">Header</header>
                    <nav>Nav</nav>
                    <section>
                        <aside class="content-left">
                            <section>Section</section>
                            <article>Article</article>
                        </aside>
                        <aside class="content-right">
                            <aside>Aside</aside>
                        </aside>
                    </section>
                    <footer>Footer</footer>
                </main>
            </section>
        </section>
    </main>
</body>

</html>
