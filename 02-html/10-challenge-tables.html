<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 - Challenge Tables</title>
    <link rel="stylesheet" href="../css/master.css">
    <style>
        table {
            border-collapse: collapse;
            margin: 2rem auto;
        }
        td {
            width: 44px;
            height: 44px;
            border: 2px solid #fff1;
            border-radius: 4px;
            transition: transform 0.2s ease;
        }
        td.h {
            background: linear-gradient(135deg, #ff6b6b, #e63946);
            border-color: #c0392b;
            box-shadow: inset 0 2px 4px #fff4, 0 2px 6px #e6394655;
        }
        td.h:hover {
            transform: scale(1.15);
            background: linear-gradient(135deg, #ff8e8e, #ff4757);
            z-index: 1;
            position: relative;
        }
    </style>
</head>
<body class="html">
    <a href="index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">

        </svg>
    </a>
    <main>
        <header class="header">
            <h2>10 - Challenge Tables</h2>
            <p>Heart shape built with table cells &amp; colspan</p>
        </header>
        <section>
            <section class="section">
                <table>
                    <!-- Row 1: _ _ X X _ _ X X _ _ -->

                        <td colspan="2"></td>
                        <td class="h"></td>
